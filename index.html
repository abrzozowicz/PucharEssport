<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking Essport LIVE</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="RANKING_ESSPORT_LIVE - Oficjalne Wyniki">
    <meta property="og:description" content="Sprawdź aktualną klasyfikację sezonu. Kliknij w zawodnika, aby zobaczyć szczegóły jego występów!">
    <meta property="og:image" content="https://zapodaj.net/images/9506974e638f8.jpg">
    <meta property="og:url" content="https://abrzozowicz.github.io/PucharEssport/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://zapodaj.net/images/9506974e638f8.jpg">

    <style>
        :root {
            --bg-color: #050505;
            --header-bg: #111;
            --text-color: #e0e0e0;
            --accent-green: #00ff41;
            --accent-red: #ff0000;
            --border-color: #222;
            --row-alt: rgba(255, 255, 255, 0.02);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .main-wrapper { width: 100%; max-width: 1000px; margin: 0 auto; padding: 10px; box-sizing: border-box; }

        h1 {
            text-align: left; text-transform: uppercase; letter-spacing: 2px;
            border-left: 4px solid var(--accent-red); padding-left: 15px;
            margin: 15px 0 25px 0; font-size: 1.2rem; color: #fff;
        }

        .ranking-table-container { 
            width: 100%; 
            border: 1px solid var(--border-color); 
            background: #0a0a0a;
            border-radius: 4px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; table-layout: auto; }

        /* Nagłówki */
        .header-row { background-color: var(--header-bg); text-transform: uppercase; font-size: 0.75rem; color: var(--accent-red); }
        .header-row th { padding: 15px 10px; border-bottom: 2px solid var(--accent-red); font-weight: 900; }

        /* Wiersze */
        .player-row { cursor: pointer; border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
        .player-row:nth-child(even) { background-color: var(--row-alt); }
        .player-row:active { background-color: #1a1a1a; }

        .col-lp { width: 40px; color: #555; text-align: center; font-weight: bold; font-size: 0.8rem; }
        
        .player-name { 
            text-align: left !important; 
            padding: 15px 10px !important; 
            font-weight: 600; 
            color: #fff;
            font-size: 0.95rem;
            line-height: 1.2;
        }

        .total-score { 
            width: 70px;
            font-weight: 900; 
            color: var(--accent-red); 
            font-size: 1.2rem; 
            text-align: center !important;
            padding-right: 10px !important;
        }

        /* Sekcja Detali (Rozwijana) */
        .details-row { display: none; background-color: #080808; border-bottom: 1px solid var(--border-color); }
        .details-row.open { display: table-row; }
        
        .details-container { 
            padding: 15px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
        }

        .detail-card { 
            background: #121212; 
            padding: 10px; 
            border-radius: 4px; 
            border: 1px solid #222;
            text-align: center;
        }
        .detail-card span { display: block; font-size: 0.6rem; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .detail-card b { font-size: 0.85rem; color: #eee; display: block; }
        .detail-card i { display: block; font-size: 0.75rem; color: var(--accent-green); font-style: normal; margin-top: 4px; font-weight: bold; }

        .top24 { border-left: 4px solid var(--accent-green); }
        .top24 .player-name { color: var(--accent-green); }

        @media (min-width: 800px) {
            .details-container { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h1>RANKING_ESSPORT_LIVE</h1>
    <div class="ranking-table-container">
        <table id="dynamicTable">
            <thead>
                <tr class="header-row">
                    <th class="col-lp">#</th>
                    <th style="text-align:left; padding-left:10px;">ZAWODNIK</th>
                    <th class="total-score">SUMA</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="3" style="padding:50px; text-align:center; color:#444;">ŁADOWANIE_DANYCH...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTOj5_aDejIsMY9W1lXRgb2xFEwA-n7OAYuqZz_2zdLTr0F9n6IgixQAHvDp-PUH7zadqxDA7MEhdi/pub?gid=0&single=true&output=csv';

    async function fetchRanking() {
        try {
            const response = await fetch(csvUrl + '&t=' + new Date().getTime());
            const text = await response.text();
            const rows = text.split('\n').filter(line => line.trim() !== '');
            if (rows.length < 2) return;

            const headerCols = rows[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const totalColsCount = headerCols.length;
            const tournamentCount = (totalColsCount - 3) / 2;

            let bodyHtml = '';
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                if (!cols[1]) continue;

                const isTop24 = i <= 24 ? 'top24' : '';
                const lp = cols[0] || i;
                const name = cols[1];
                const totalScore = cols[totalColsCount - 1];

                bodyHtml += `
                <tr class="player-row ${isTop24}" onclick="toggleDetails(${i})">
                    <td class="col-lp">${lp}</td>
                    <td class="player-name">${name}</td>
                    <td class="total-score">${totalScore}</td>
                </tr>
                <tr class="details-row" id="details-${i}">
                    <td colspan="3">
                        <div class="details-container">`;
                
                for(let j = 0; j < tournamentCount; j++) {
                    const mce = cols[j+2] || '-';
                    const pkt = cols[j+2+tournamentCount] || 0;
                    bodyHtml += `
                        <div class="detail-card">
                            <span>Turniej ${j+1}</span>
                            <b>M-ce: ${mce}</b>
                            <i>+${pkt} PKT</i>
                        </div>`;
                }
                
                bodyHtml += `</div></td></tr>`;
            }
            document.getElementById('tableBody').innerHTML = bodyHtml;

        } catch (e) { 
            console.error("Błąd ładowania:", e); 
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="3" style="padding:20px;">BŁĄD_SYNCHRONIZACJI</td></tr>';
        }
    }

    function toggleDetails(id) {
        const target = document.getElementById(`details-${id}`);
        const isOpen = target.classList.contains('open');
        document.querySelectorAll('.details-row').forEach(row => row.classList.remove('open'));
        if (!isOpen) {
            target.classList.add('open');
        }
    }

    fetchRanking();
    setInterval(fetchRanking, 60000);
</script>

</body>
</html>
