<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essport - Tech Ranking</title>
    <style>
        :root {
            --bg: #000000;
            --row-bg: #0a0a0a;
            --accent-red: #ff0000;
            --accent-green: #00ff41;
            --text: #ffffff;
            --border: #222;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 1200px; padding: 10px; }
        
        h1 { 
            text-align: left; font-size: 1.5rem; letter-spacing: 2px; 
            border-left: 4px solid var(--accent-red); padding-left: 15px;
            margin: 20px 0; text-transform: uppercase;
        }

        /* TABELA BAZOWA */
        .ranking-table { width: 100%; border-collapse: collapse; }
        
        .header { 
            background: #111; color: var(--accent-red); 
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
        }
        
        .header th { padding: 15px 5px; border-bottom: 2px solid var(--accent-red); text-align: center; }
        .header th.align-left { text-align: left; padding-left: 15px; }

        .player-row { border-bottom: 1px solid var(--border); transition: 0.2s; cursor: pointer; }
        .player-row:hover { background: #151515; }
        
        /* Wyróżnienie TOP 24 */
        .top24 { border-left: 3px solid var(--accent-green); background: rgba(0, 255, 65, 0.03); }
        .top24 .name { color: var(--accent-green); }

        .player-row td { padding: 15px 5px; text-align: center; font-size: 0.9rem; }
        .name { text-align: left !important; padding-left: 15px !important; font-weight: bold; font-size: 1rem; }
        .total { font-weight: 900; color: var(--accent-red); font-size: 1.1rem; }

        /* UKRYWANIE KOLUMN NA MOBILE */
        .col-detail { display: none; }

        /* PANEL DETALI (Tylko Mobile) */
        .details-row { display: none; background: #050505; }
        .details-container { 
            padding: 15px; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px;
        }
        .detail-card { background: #111; padding: 8px; border-radius: 4px; border: 1px solid #222; text-align: center; }
        .detail-card span { display: block; font-size: 0.6rem; color: #666; text-transform: uppercase; }
        .detail-card b { font-size: 0.8rem; color: #fff; }

        /* RESPONSYWNOŚĆ - DESKTOP */
        @media (min-width: 1024px) {
            .col-detail { display: table-cell; }
            .player-row { cursor: default; }
            .details-row { display: none !important; }
            .header th { font-size: 0.8rem; }
        }

        /* Aktywacja detali na Mobile */
        .is-active + .details-row { display: table-row; }
        .is-active { background: #1a1a1a !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>RANKING_ESSPORT_LIVE</h1>
    
    <table class="ranking-table">
        <thead>
            <tr class="header">
                <th>Poz</th>
                <th class="align-left">Zawodnik</th>
                <th class="col-detail">T1</th><th class="col-detail">T2</th><th class="col-detail">T3</th>
                <th class="col-detail">T4</th><th class="col-detail">T5</th>
                <th class="col-detail">P1</th><th class="col-detail">P2</th><th class="col-detail">P3</th>
                <th class="col-detail">P4</th><th class="col-detail">P5</th>
                <th>Suma</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTOj5_aDejIsMY9W1lXRgb2xFEwA-n7OAYuqZz_2zdLTr0F9n6IgixQAHvDp-PUH7zadqxDA7MEhdi/pub?gid=0&single=true&output=csv';

    async function fetchRanking() {
        try {
            const response = await fetch(csvUrl + '&t=' + new Date().getTime());
            const text = await response.text();
            const lines = text.split('\n').filter(l => l.trim() !== '');
            
            let html = '';
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                
                if (cols[1] && cols[1] !== "") {
                    const isTop24 = i <= 24 ? 'top24' : '';
                    
                    html += `
                    <tr class="player-row ${isTop24}" onclick="this.classList.toggle('is-active')">
                        <td>${cols[0] || i}</td>
                        <td class="name">${cols[1]}</td>
                        <td class="col-detail">${cols[2] || '-'}</td><td class="col-detail">${cols[3] || '-'}</td>
                        <td class="col-detail">${cols[4] || '-'}</td><td class="col-detail">${cols[5] || '-'}</td>
                        <td class="col-detail">${cols[6] || '-'}</td><td class="col-detail">${cols[7] || 0}</td>
                        <td class="col-detail">${cols[8] || 0}</td><td class="col-detail">${cols[9] || 0}</td>
                        <td class="col-detail">${cols[10] || 0}</td><td class="col-detail">${cols[11] || 0}</td>
                        <td class="total">${cols[12] || 0}</td>
                    </tr>
                    <tr class="details-row">
                        <td colspan="3">
                            <div class="details-container">
                                <div class="detail-card"><span>T1 (M/P)</span><b>${cols[2] || '-'}/${cols[7] || 0}</b></div>
                                <div class="detail-card"><span>T2 (M/P)</span><b>${cols[3] || '-'}/${cols[8] || 0}</b></div>
                                <div class="detail-card"><span>T3 (M/P)</span><b>${cols[4] || '-'}/${cols[9] || 0}</b></div>
                                <div class="detail-card"><span>T4 (M/P)</span><b>${cols[5] || '-'}/${cols[10] || 0}</b></div>
                                <div class="detail-card"><span>T5 (M/P)</span><b>${cols[6] || '-'}/${cols[11] || 0}</b></div>
                            </div>
                        </td>
                    </tr>`;
                }
            }
            document.getElementById('tableBody').innerHTML = html;
        } catch (e) { console.error(e); }
    }

    fetchRanking();
    setInterval(fetchRanking, 60000);
</script>

</body>
</html>
