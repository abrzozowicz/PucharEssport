<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Oficjalny ranking 2. sezonu Pucharu Essport">
    <meta name="author" content="Puchar Essport 2.0">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://abrzozowicz.github.io/PucharEssport/">
    <meta property="og:title" content="RANKING PUCHARU ESSPORT SEZON 2 🎯">
    <meta property="og:description" content="Sprawdź aktualne punkty i miejsca w rankingu.">
    <meta property="og:image" content="https://raw.githubusercontent.com/abrzozowicz/PucharEssport/main/paint.jpg">

    <title>RANKING PUCHARU ESSPORT SEZON 2 🎯</title>

    <style>
        :root {
            --bg-color: #050505;
            --header-bg: #111;
            --text-color: #e0e0e0;
            --accent-green: #00ff41;
            --accent-red: #ff0000;
            --border-color: #222;
            --row-alt: rgba(255, 255, 255, 0.02);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .main-wrapper { width: 100%; max-width: 1000px; margin: 0 auto; padding: 10px; box-sizing: border-box; }

        h1 {
            text-align: left; text-transform: uppercase; letter-spacing: 2px;
            border-left: 4px solid var(--accent-red); padding-left: 15px;
            margin: 15px 0 25px 0; font-size: 1.2rem; color: #fff;
        }

        .ranking-table-container { 
            width: 100%; 
            border: 1px solid var(--border-color); 
            background: #0a0a0a;
            border-radius: 4px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; table-layout: auto; }

        .header-row { background-color: var(--header-bg); text-transform: uppercase; font-size: 0.75rem; color: var(--accent-red); }
        .header-row th { padding: 15px 10px; border-bottom: 2px solid var(--accent-red); font-weight: 900; }

        .player-row { cursor: pointer; border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
        .player-row:nth-child(even) { background-color: var(--row-alt); }
        .player-row:active { background-color: #1a1a1a; }

        .col-lp { width: 40px; color: #555; text-align: center; font-weight: bold; font-size: 0.8rem; }
        
        .player-name { 
            text-align: left !important; 
            padding: 15px 10px !important; 
            font-weight: 600; 
            color: #fff;
            font-size: 0.95rem;
        }

        .player-name::after { content: ' ▾'; color: #444; font-size: 0.7rem; margin-left: 5px; }

        .total-score { 
            width: 70px;
            font-weight: 900; 
            color: var(--accent-red); 
            font-size: 1.2rem; 
            text-align: center !important;
            padding-right: 10px !important;
        }

        .details-row { display: none; background-color: #080808; }
        .details-row.open { display: table-row; }
        .details-container { padding: 5px 15px 15px 15px; }

        .details-list {
            list-style: none;
            margin: 0; padding: 0;
            border-top: 1px solid #1a1a1a;
        }

        .details-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.85rem;
        }

        .details-list li.ignored-result {
            opacity: 0.4;
            text-decoration: line-through;
            background: rgba(255, 0, 0, 0.02);
        }

        .turniej-label { color: #666; text-transform: uppercase; font-size: 0.7rem; font-weight: bold; width: 80px; }
        .wynik-label { color: #eee; flex-grow: 1; text-align: left; padding-left: 10px; }
        .pkt-label { color: var(--accent-green); font-weight: 900; font-family: monospace; }
        
        .summary-row {
            margin-top: 5px;
            border-top: 2px solid #222;
            padding-top: 15px !important;
        }

        .summary-label { color: var(--accent-red); font-weight: 900; text-transform: uppercase; font-size: 0.8rem; }
        .summary-total { color: var(--accent-red); font-weight: 900; font-size: 1.1rem; }

        .top24 { border-left: 4px solid var(--accent-green); }
        .top24 .player-name { color: var(--accent-green); }

        @media (min-width: 800px) {
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h1>RANKING PUCHARU ESSPORT SEZON 2 🎯</h1>
    <div class="ranking-table-container">
        <table id="dynamicTable">
            <thead>
                <tr class="header-row">
                    <th class="col-lp">#</th>
                    <th style="text-align:left; padding-left:10px;">ZAWODNIK</th>
                    <th class="total-score">SUMA (5)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="3" style="padding:50px; text-align:center; color:#444;">ŁADOWANIE_DANYCH...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTOj5_aDejIsMY9W1lXRgb2xFEwA-n7OAYuqZz_2zdLTr0F9n6IgixQAHvDp-PUH7zadqxDA7MEhdi/pub?gid=0&single=true&output=csv';

    async function fetchRanking() {
        try {
            const response = await fetch(csvUrl + '&t=' + new Date().getTime());
            const text = await response.text();
            const rows = text.split('\n').filter(line => line.trim() !== '');
            if (rows.length < 2) return;

            const separator = text.includes(';') ? ';' : ',';
            const headerCols = rows[0].split(new RegExp(`${separator}(?=(?:(?:[^"]*"){2})*[^"]*$)`));
            const totalColsCount = headerCols.length;
            const tournamentCount = (totalColsCount - 3) / 2;

            let bodyHtml = '';
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(new RegExp(`${separator}(?=(?:(?:[^"]*"){2})*[^"]*$)`)).map(c => c.replace(/"/g, '').trim());
                if (!cols[1]) continue;

                // 1. Zbieranie wszystkich punktów zawodnika
                let playerPoints = [];
                for(let j = 0; j < tournamentCount; j++) {
                    const val = parseFloat(cols[j + 2 + tournamentCount]) || 0;
                    if (val > 0) playerPoints.push(val);
                }

                // 2. Obliczanie Top 5
                const sortedPoints = [...playerPoints].sort((a, b) => b - a);
                const top5Threshold = sortedPoints.length > 5 ? sortedPoints[4] : 0;
                
                // Uwaga: Obsługa przypadku, gdy ktoś ma kilka takich samych wyników na granicy top 5
                let countedCount = 0;
                const calculatedTotal = sortedPoints.slice(0, 5).reduce((a, b) => a + b, 0);

                const isTop24 = i <= 24 ? 'top24' : '';
                const lp = cols[0] || i;
                const name = cols[1];

                bodyHtml += `
                <tr class="player-row ${isTop24}" onclick="toggleDetails(${i})">
                    <td class="col-lp">${lp}</td>
                    <td class="player-name">${name}</td>
                    <td class="total-score">${calculatedTotal}</td>
                </tr>
                <tr class="details-row" id="details-${i}">
                    <td colspan="3">
                        <div class="details-container">
                            <ul class="details-list">`;
                
                let hasHistory = false;
                // Kopia punktów do oznaczania użytych w Top 5
                let pointsForCheck = [...sortedPoints].slice(0, 5);

                for(let j = 0; j < tournamentCount; j++) {
                    const mce = cols[j+2] || '-';
                    const pktVal = parseFloat(cols[j+2+tournamentCount]) || 0;
                    
                    if (pktVal > 0) {
                        hasHistory = true;
                        
                        // Sprawdzamy czy dany wynik mieści się w Top 5
                        let isUsed = false;
                        const matchIndex = pointsForCheck.indexOf(pktVal);
                        if (matchIndex !== -1) {
                            isUsed = true;
                            pointsForCheck.splice(matchIndex, 1); // Usuwamy, by nie liczyć dwa razy tej samej wartości
                        }

                        const rowClass = isUsed ? '' : 'ignored-result';
                        const labelExtra = isUsed ? '' : ' <small style="color:var(--accent-red)">(odrzucony)</small>';

                        bodyHtml += `
                        <li class="${rowClass}">
                            <span class="turniej-label">Turniej ${j+1}</span>
                            <span class="wynik-label">Miejsce: <b>${mce}</b>${labelExtra}</span>
                            <span class="pkt-label">+${pktVal} PKT</span>
                        </li>`;
                    }
                }

                if (!hasHistory) {
                    bodyHtml += `<li style="color:#444; justify-content:center;">Brak rozegranych turniejów</li>`;
                } else {
                    bodyHtml += `
                    <li class="summary-row">
                        <span class="summary-label">Suma (Najlepsze 5)</span>
                        <span class="summary-total">${calculatedTotal} PKT</span>
                    </li>`;
                }
                
                bodyHtml += `</ul></div></td></tr>`;
            }
            document.getElementById('tableBody').innerHTML = bodyHtml;

        } catch (e) { 
            console.error("Błąd ładowania:", e); 
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="3" style="padding:20px;">BŁĄD_SYNCHRONIZACJI</td></tr>';
        }
    }

    function toggleDetails(id) {
        const target = document.getElementById(`details-${id}`);
        const isOpen = target.classList.contains('open');
        document.querySelectorAll('.details-row').forEach(row => row.classList.remove('open'));
        if (!isOpen) {
            target.classList.add('open');
        }
    }

    fetchRanking();
    setInterval(fetchRanking, 60000);
</script>

</body>
</html>
