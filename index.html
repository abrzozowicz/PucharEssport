<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Oficjalny ranking 2. sezonu Pucharu Essport">
    <meta name="author" content="Puchar Essport 2.0">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://abrzozowicz.github.io/PucharEssport/">
    <meta property="og:title" content="RANKING PUCHARU ESSPORT SEZON 2  Wyniki po 7 Turniejach🎯">
    <meta property="og:description" content="Sprawdź aktualne punkty i miejsca w rankingu.">
    <meta property="og:image" content="https://raw.githubusercontent.com/abrzozowicz/PucharEssport/main/paint.jpg">

    <title>RANKING PUCHARU ESSPORT SEZON 2 Tabela po 7 Turniejach🎯</title>

    <style>
        :root {
            --bg-color: #050505;
            --header-bg: #111;
            --text-color: #e0e0e0;
            --accent-green: #00ff41;
            --accent-red: #ff0000;
            --accent-gold: #ffd700; /* Nowy kolor dla TOP 8 */
            --border-color: #222;
            --row-alt: rgba(255, 255, 255, 0.02);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .main-wrapper { width: 100%; max-width: 1000px; margin: 0 auto; padding: 10px; box-sizing: border-box; }

        h1 {
            text-align: left; text-transform: uppercase; letter-spacing: 2px;
            border-left: 4px solid var(--accent-red); padding-left: 15px;
            margin: 15px 0 25px 0; font-size: 1.2rem; color: #fff;
        }

        .ranking-table-container { 
            width: 100%; 
            border: 1px solid var(--border-color); 
            background: #0a0a0a;
            border-radius: 4px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }

        .header-row { background-color: var(--header-bg); text-transform: uppercase; color: var(--accent-red); }
        .header-row th { 
            padding: 15px 5px; 
            border-bottom: 2px solid var(--accent-red); 
            font-weight: 900; 
            font-size: 0.6rem;
        }

        .player-row { cursor: pointer; border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
        .player-row:nth-child(even) { background-color: var(--row-alt); }
        .player-row:active { background-color: #1a1a1a; }

        /* Szerokości kolumn */
        .col-lp { width: 30px; color: #555; text-align: center; font-weight: bold; font-size: 0.8rem; }
        .col-name { text-align: left !important; padding-left: 10px !important; padding-top: 12px !important; padding-bottom: 12px !important; }
        .col-games { width: 65px; text-align: center !important; color: #888; font-weight: bold; font-size: 0.9rem; }
        .col-score { width: 75px; text-align: center !important; padding-right: 5px !important; }

        /* POPRAWKA: Usunięcie zwijania tekstu, pozwolenie na wyższe wiersze */
        .player-name { 
            font-weight: 600; 
            color: #fff;
            font-size: 0.9rem;
            white-space: normal; /* Pozwala na zawijanie tekstu w komórce */
            word-break: break-word; /* W razie długich nazwisk */
        }

        /* Strzałka rozwijania menu – teraz reaguje poprawnie przy łamaniu linii */
        .player-name::after { content: ' ▾'; color: #444; font-size: 0.7rem; margin-left: 3px; display: inline-block; }

        .total-score { 
            font-weight: 900; 
            color: var(--accent-red); 
            font-size: 1.1rem; 
        }

        .details-row { display: none; background-color: #080808; }
        .details-row.open { display: table-row; }
        .details-container { padding: 5px 15px 15px 15px; }

        .details-list {
            list-style: none;
            margin: 0; padding: 0;
            border-top: 1px solid #1a1a1a;
        }

        .details-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.85rem;
        }

        .details-list li.ignored-result {
            opacity: 0.35;
            text-decoration: line-through;
        }

        .turniej-label { color: #666; text-transform: uppercase; font-size: 0.7rem; font-weight: bold; width: 80px; }
        .wynik-label { color: #eee; flex-grow: 1; text-align: left; padding-left: 10px; }
        .pkt-label { color: var(--accent-green); font-weight: 900; font-family: monospace; }
        
        .summary-row {
            margin-top: 5px;
            border-top: 2px solid #222;
            padding-top: 15px !important;
        }

        .summary-label { color: var(--accent-red); font-weight: 900; text-transform: uppercase; font-size: 0.8rem; }
        .summary-total { color: var(--accent-red); font-weight: 900; font-size: 1.1rem; }

        /* Style dla TOP 24 i nowej Złotej Ósemki (TOP 8) */
        .top24 { border-left: 4px solid var(--accent-green); }
        .top24 .player-name { color: var(--accent-green); }

        .top8 { border-left: 4px solid var(--accent-gold); }
        .top8 .player-name { color: var(--accent-gold); font-weight: 800; }
        
        /* POPRAWKA: Badge rozstawienia lepiej zachowuje się na smartfonach */
        .seed-badge {
            color: var(--accent-gold);
            font-size: 0.6rem;
            font-weight: 900;
            letter-spacing: 1px;
            margin-left: 4px;
            border: 1px solid var(--accent-gold);
            padding: 1px 4px;
            border-radius: 3px;
            text-transform: uppercase;
            vertical-align: middle;
            display: inline-block; /* Zapobiega brzydkiemu rozciąganiu */
            margin-top: 4px; /* Daje lekki odstęp, jeśli spadnie do nowej linii */
        }

        @media (min-width: 800px) {
            h1 { font-size: 1.6rem; }
            .header-row th { font-size: 0.75rem; }
            .col-lp { width: 40px; }
            .col-games { width: 150px; }
            .col-score { width: 120px; }
            .seed-badge { margin-top: 0; margin-left: 6px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h1>RANKING PUCHARU ESSPORT SEZON 2 Tabela po 7 Turniejach, Suma 5 najlepszych Turniejów 🎯 Przy udziale w min.4 </h1>
    <div class="ranking-table-container">
        <table id="dynamicTable">
            <thead>
                <tr class="header-row">
                    <th class="col-lp">#</th>
                    <th class="col-name">ZAWODNIK</th>
                    <th class="col-games">LICZBA TURNIEJÓW</th>
                    <th class="col-score">SUMA (5)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4" style="padding:50px; text-align:center; color:#444;">ŁADOWANIE_DANYCH...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTOj5_aDejIsMY9W1lXRgb2xFEwA-n7OAYuqZz_2zdLTr0F9n6IgixQAHvDp-PUH7zadqxDA7MEhdi/pub?gid=0&single=true&output=csv';

    async function fetchRanking() {
        try {
            const response = await fetch(csvUrl + '&t=' + new Date().getTime());
            const text = await response.text();
            const rows = text.split('\n').filter(line => line.trim() !== '');
            if (rows.length < 2) return;

            const separator = text.includes(';') ? ';' : ',';
            const headerCols = rows[0].split(new RegExp(`${separator}(?=(?:(?:[^"]*"){2})*[^"]*$)`));
            const totalColsCount = headerCols.length;
            const tournamentCount = (totalColsCount - 3) / 2;

            // 1. Zbieramy wszystkich zawodników do tymczasowej tablicy obiektów
            let playersList = [];

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(new RegExp(`${separator}(?=(?:(?:[^"]*"){2})*[^"]*$)`)).map(c => c.replace(/"/g, '').trim());
                if (!cols[1]) continue;

                let playerPoints = [];
                for(let j = 0; j < tournamentCount; j++) {
                    const val = parseFloat(cols[j + 2 + tournamentCount]) || 0;
                    if (val > 0) playerPoints.push(val);
                }

                const gamesPlayed = playerPoints.length;
                const sortedPoints = [...playerPoints].sort((a, b) => b - a);
                const calculatedTotal = sortedPoints.slice(0, 5).reduce((a, b) => a + b, 0);

                playersList.push({
                    id: i, // potrzebne do toggleDetails
                    name: cols[1],
                    gamesPlayed: gamesPlayed,
                    calculatedTotal: calculatedTotal,
                    sortedPoints: sortedPoints,
                    rawCols: cols // zachowujemy surowe kolumny do wygenerowania historii
                });
            }

            // 2. NOWE SORTOWANIE ZGODNIE Z TWOIMI ZASADAMI:
            // - Jeśli ktoś ma mniej niż 4 turnieje, spada na koniec listy.
            // - W obrębie swoich grup decyduje suma punktów (malejąco).
            playersList.sort((a, b) => {
                const aHasMin4 = a.gamesPlayed >= 4;
                const bHasMin4 = b.gamesPlayed >= 4;

                if (aHasMin4 && !bHasMin4) return -1; // a wyżej
                if (!aHasMin4 && bHasMin4) return 1;  // b wyżej
                
                // Jeśli obaj mają >= 4 LUB obaj mają < 4, decydują punkty
                return b.calculatedTotal - a.calculatedTotal;
            });

            // 3. Generujemy kod HTML na podstawie posortowanej listy
            let bodyHtml = '';
            
            playersList.forEach((player, index) => {
                const currentRank = index + 1; // Nowa, rzeczywista pozycja w rankingu
                
                // Przypisywanie klas i wyróżnień na podstawie ostatecznej pozycji
                let rankClass = '';
                let badgeHtml = '';

                if (currentRank <= 8) {
                    rankClass = 'top8';
                    badgeHtml = ' <span class="seed-badge">👑 Rozstawienie</span>';
                } else if (currentRank <= 24) {
                    rankClass = 'top24';
                }

                bodyHtml += `
                <tr class="player-row ${rankClass}" onclick="toggleDetails(${player.id})">
                    <td class="col-lp">${currentRank}</td>
                    <td class="player-name col-name">${player.name}${badgeHtml}</td>
                    <td class="col-games">${player.gamesPlayed}</td>
                    <td class="total-score col-score">${player.calculatedTotal}</td>
                </tr>
                <tr class="details-row" id="details-${player.id}">
                    <td colspan="4">
                        <div class="details-container">
                            <ul class="details-list">`;
                
                let hasHistory = false;
                let pointsForCheck = [...player.sortedPoints].slice(0, 5);

                for(let j = 0; j < tournamentCount; j++) {
                    const mce = player.rawCols[j+2] || '-';
                    const pktVal = parseFloat(player.rawCols[j+2+tournamentCount]) || 0;
                    
                    if (pktVal > 0) {
                        hasHistory = true;
                        let isUsed = false;
                        const matchIndex = pointsForCheck.indexOf(pktVal);
                        if (matchIndex !== -1) {
                            isUsed = true;
                            pointsForCheck.splice(matchIndex, 1);
                        }

                        const rowClass = isUsed ? '' : 'ignored-result';
                        const labelExtra = isUsed ? '' : ' <small style="color:var(--accent-red)">(odrzucony)</small>';

                        bodyHtml += `
                        <li class="${rowClass}">
                            <span class="turniej-label">Turniej ${j+1}</span>
                            <span class="wynik-label">Miejsce: <b>${mce}</b>${labelExtra}</span>
                            <span class="pkt-label">+${pktVal} PKT</span>
                        </li>`;
                    }
                }

                if (!hasHistory) {
                    bodyHtml += `<li style="color:#444; justify-content:center;">Brak rozegranych turniejów</li>`;
                } else {
                    bodyHtml += `
                    <li class="summary-row">
                        <span class="summary-label">Suma (Najlepsze 5 z ${player.gamesPlayed})</span>
                        <span class="summary-total">${player.calculatedTotal} PKT</span>
                    </li>`;
                }
                
                bodyHtml += `</ul></div></td></tr>`;
            });

            document.getElementById('tableBody').innerHTML = bodyHtml;

        } catch (e) { 
            console.error("Błąd ładowania:", e); 
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" style="padding:20px;">BŁĄD_SYNCHRONIZACJI</td></tr>';
        }
    }

    function toggleDetails(id) {
        const target = document.getElementById(`details-${id}`);
        const isOpen = target.classList.contains('open');
        document.querySelectorAll('.details-row').forEach(row => row.classList.remove('open'));
        if (!isOpen) {
            target.classList.add('open');
        }
    }

    fetchRanking();
    setInterval(fetchRanking, 60000);
</script>

</body>
</html>
