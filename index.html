<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essport - Daft Punk Edition</title>
    <style>
        :root {
            --bg-black: #050505;
            --daft-red: #ff0000;
            --daft-green: #00ff41; /* Klasyczny kolor Matrixa/Daft Punk */
            --pure-white: #ffffff;
            --glass-red: rgba(255, 0, 0, 0.1);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Courier New', Courier, monospace; /* Bardziej techniczna czcionka */
            background: var(--bg-black);
            background-image: 
                linear-gradient(rgba(255, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90px, rgba(255, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 100% 4px, 4px 100%; /* Delikatne poziome linie starego monitora */
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: var(--pure-white);
            overflow: hidden;
        }

        .main-wrapper {
            width: 98%; max-width: 1500px; height: 94vh;
            background: rgba(0, 0, 0, 0.9);
            border: 4px solid var(--daft-red);
            border-radius: 5px; /* Bardziej kanciaste, retro-futurystyczne */
            display: flex; flex-direction: column;
            box-shadow: 0 0 30px var(--daft-red), inset 0 0 15px var(--daft-red);
        }

        .header-section { 
            padding: 25px; 
            text-align: center; 
            border-bottom: 4px solid var(--daft-red);
            background: var(--daft-red);
        }
        
        h1 { 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 12px; 
            color: var(--bg-black); 
            font-weight: 900;
            font-size: 3em;
            text-shadow: none;
        }

        .table-container { flex-grow: 1; overflow-y: auto; padding: 0 10px; }
        .table-container::-webkit-scrollbar { width: 12px; }
        .table-container::-webkit-scrollbar-thumb { background: var(--daft-red); }

        table { width: 100%; border-collapse: collapse; font-size: 18px; }
        thead { position: sticky; top: 0; background: var(--bg-black); z-index: 10; }
        
        th { 
            padding: 20px 5px; 
            color: var(--daft-red); 
            border-bottom: 2px solid var(--daft-red); 
            text-transform: uppercase; 
            font-size: 14px;
        }
        
        td { 
            padding: 15px 5px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255, 0, 0, 0.2); 
        }

        /* WYRÓŻNIENIE TOP 24 - ZIELONY STYL MATRYCY */
        .top24 { background: rgba(0, 255, 65, 0.05); }
        .top24 .player-name { color: var(--daft-green); text-shadow: 0 0 8px var(--daft-green); }
        .top24 .rank-col { color: var(--daft-green); }

        .player-name { 
            text-align: left; 
            font-weight: bold; 
            min-width: 250px; 
            color: var(--pure-white); 
            padding-left: 25px; 
            font-size: 20px;
            text-transform: uppercase;
        }

        .total-score { 
            font-weight: 900; 
            color: var(--bg-black); 
            background: var(--daft-red); 
            font-size: 24px; 
            box-shadow: 0 0 10px var(--daft-red);
        }

        .rank-col { width: 70px; font-weight: 900; color: var(--daft-red); font-size: 22px; }
        
        .divider { border-left: 2px solid var(--daft-red); }

        .status-bar { 
            font-size: 14px; 
            color: var(--daft-red); 
            padding: 10px 25px; 
            text-align: left; 
            background: #000;
            border-top: 2px solid var(--daft-red);
            font-family: 'Courier New', monospace;
        }

        /* Animacja migania kursora */
        .status-bar::after {
            content: '_';
            animation: blink 1s infinite;
        }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header-section"><h1>RANKING ESSPORT</h1></div>
    <div class="table-container">
        <table id="rankingTable">
            <thead>
                <tr>
                    <th rowspan="2">POS</th><th rowspan="2" class="player-name">PLAYER_NAME</th>
                    <th colspan="5">STAGES_RANK</th><th colspan="5" class="divider">POINTS</th>
                    <th rowspan="2" class="divider">TOTAL</th>
                </tr>
                <tr>
                    <th>T1</th><th>T2</th><th>T3</th><th>T4</th><th>T5</th>
                    <th class="divider">T1</th><th>T2</th><th>T3</th><th>T4</th><th>T5</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="13" style="padding:100px; color: var(--daft-red);">INITIALIZING_SYSTEM...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="status-bar" id="status">STATUS: CONNECTING_TO_DATABASE</div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTOj5_aDejIsMY9W1lXRgb2xFEwA-n7OAYuqZz_2zdLTr0F9n6IgixQAHvDp-PUH7zadqxDA7MEhdi/pub?gid=0&single=true&output=csv';

    async function fetchRanking() {
        try {
            const response = await fetch(csvUrl + '&t=' + new Date().getTime());
            const text = await response.text();
            const lines = text.split('\n').filter(l => l.trim() !== '');
            
            let html = '';
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                
                if (cols[1] && cols[1] !== "") {
                    const isTop24 = i <= 24 ? 'class="top24"' : '';
                    
                    html += `
                    <tr ${isTop24}>
                        <td class="rank-col">${cols[0] || i}</td>
                        <td class="player-name">${cols[1]}</td>
                        <td>${cols[2] || '-'}</td><td>${cols[3] || '-'}</td><td>${cols[4] || '-'}</td><td>${cols[5] || '-'}</td><td>${cols[6] || '-'}</td>
                        <td class="divider">${cols[7] || 0}</td><td>${cols[8] || 0}</td><td>${cols[9] || 0}</td><td>${cols[10] || 0}</td><td>${cols[11] || 0}</td>
                        <td class="total-score divider">${cols[12] || 0}</td>
                    </tr>`;
                }
            }
            document.getElementById('tableBody').innerHTML = html;
            document.getElementById('status').innerText = 'SYSTEM_UPDATE_SUCCESSFUL: ' + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('status').innerText = 'ERROR: CONNECTION_FAILED';
        }
    }

    fetchRanking();
    setInterval(fetchRanking, 30000);
</script>

</body>
</html>
