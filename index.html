<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Essport LIVE</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --glass-bg: rgba(0, 10, 20, 0.96);
            --gold: #ffd700;
            --top24-bg: rgba(255, 215, 0, 0.07);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #000a14 url('Gemini_Generated_Image_lre4b0lre4b0lre4.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }

        .main-wrapper {
            width: 98%; max-width: 1500px; height: 94vh;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(0, 242, 255, 0.4);
            border-radius: 25px;
            display: flex; flex-direction: column;
            box-shadow: 0 0 60px rgba(0, 0, 0, 1);
        }

        .header-section { padding: 20px; text-align: center; border-bottom: 3px solid var(--neon-blue); }
        h1 { margin: 0; text-transform: uppercase; letter-spacing: 7px; color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); font-size: 2.5em; }

        .table-container { flex-grow: 1; overflow-y: auto; padding: 0 20px; }
        .table-container::-webkit-scrollbar { width: 10px; }
        .table-container::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 5px; }

        table { width: 100%; border-collapse: collapse; font-size: 16px; /* WIĘKSZA CZCIONKA OGÓLNA */ }
        thead { position: sticky; top: 0; background: #000a14; z-index: 10; }
        
        th { 
            padding: 18px 5px; 
            color: var(--neon-blue); 
            border-bottom: 3px solid var(--neon-blue); 
            text-transform: uppercase; 
            font-size: 13px;
            letter-spacing: 1px;
        }
        
        td { padding: 12px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* WYRÓŻNIENIE TOP 24 */
        .top24 { background: var(--top24-bg); }
        .top24 .player-name { color: var(--gold); text-shadow: 0 0 5px rgba(255,215,0,0.3); }

        .player-name { text-align: left; font-weight: bold; min-width: 220px; color: #fff; padding-left: 20px; font-size: 18px; }
        .total-score { font-weight: bold; color: var(--neon-blue); background: rgba(0, 242, 255, 0.2); font-size: 20px; border-radius: 6px; }
        .rank-col { width: 60px; font-weight: 800; color: #aaa; font-size: 18px; }
        
        /* Podium Icons */
        tr:nth-child(1) .rank-col { color: var(--gold); font-size: 24px; }
        
        .divider { border-left: 2px solid rgba(0, 242, 255, 0.2); }
        .status-bar { font-size: 12px; color: #777; padding: 10px 25px; text-align: right; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header-section"><h1>Ranking Essport LIVE</h1></div>
    <div class="table-container">
        <table id="rankingTable">
            <thead>
                <tr>
                    <th rowspan="2">Poz.</th><th rowspan="2" class="player-name">Zawodnik</th>
                    <th colspan="5">Miejsce w Turniejach</th><th colspan="5" class="divider">Punkty</th>
                    <th rowspan="2" class="divider">SUMA</th>
                </tr>
                <tr>
                    <th>T1</th><th>T2</th><th>T3</th><th>T4</th><th>T5</th>
                    <th class="divider">T1</th><th>T2</th><th>T3</th><th>T4</th><th>T5</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="13" style="padding:100px; font-size: 20px;">Ładowanie zawodników...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="status-bar" id="status">Synchronizacja...</div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTOj5_aDejIsMY9W1lXRgb2xFEwA-n7OAYuqZz_2zdLTr0F9n6IgixQAHvDp-PUH7zadqxDA7MEhdi/pub?gid=0&single=true&output=csv';

    async function fetchRanking() {
        try {
            const response = await fetch(csvUrl + '&t=' + new Date().getTime());
            const text = await response.text();
            const lines = text.split('\n').filter(l => l.trim() !== '');
            
            let html = '';
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                
                if (cols[1] && cols[1] !== "") {
                    // Sprawdzamy czy wiersz należy do TOP 24
                    const isTop24 = i <= 24 ? 'class="top24"' : '';
                    
                    html += `
                    <tr ${isTop24}>
                        <td class="rank-col">${cols[0] || i}</td>
                        <td class="player-name">${cols[1]}</td>
                        <td>${cols[2] || '-'}</td><td>${cols[3] || '-'}</td><td>${cols[4] || '-'}</td><td>${cols[5] || '-'}</td><td>${cols[6] || '-'}</td>
                        <td class="divider">${cols[7] || 0}</td><td>${cols[8] || 0}</td><td>${cols[9] || 0}</td><td>${cols[10] || 0}</td><td>${cols[11] || 0}</td>
                        <td class="total-score divider">${cols[12] || 0}</td>
                    </tr>`;
                }
            }
            document.getElementById('tableBody').innerHTML = html;
            document.getElementById('status').innerText = 'Ostatnia aktualizacja: ' + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('status').innerText = 'Błąd połączenia!';
        }
    }

    fetchRanking();
    setInterval(fetchRanking, 30000);
</script>

</body>
</html>
